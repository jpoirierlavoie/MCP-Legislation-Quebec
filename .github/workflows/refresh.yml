name: refresh-statutes

# Rafraîchissement semestriel du corpus (PLAN.md §6). Retélécharge les EPUB de
# LégisQuébec, reparse, et recharge la base D1 cloud (staging -> bascule).
#
# ⚠️ DÉCLENCHEMENT MANUEL UNIQUEMENT — le `schedule:` a été RETIRÉ à dessein.
# Ce job ne fait qu'une PARTIE du rafraîchissement : il recharge les articles, mais
# PAS la couche découverte (discovery/load.py, relations.py) NI les ~27 000 vecteurs
# Vectorize. Exécuté seul et sans surveillance, il laisserait les embeddings pointer
# l'ANCIEN texte — la recherche sémantique rendrait du droit périmé sans le dire,
# ce qui est le pire défaut possible pour un outil juridique.
# La procédure complète (et l'éval de non-régression qui la clôt) est dans CLAUDE.md,
# section « Rafraîchissement semestriel ». Ne remettre un `schedule:` qu'une fois les
# étapes manquantes automatisées ET la porte d'éval câblée.
on:
  workflow_dispatch: {} # déclenchement manuel à la demande, sous surveillance

permissions:
  contents: read

concurrency:
  group: refresh-statutes
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci # installe wrangler (utilisé par --apply-remote)

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r pipeline/requirements.txt

      # Toutes les lois × langues -> D1 cloud. --refresh-dates capte la date
      # « à jour au » live sur la page de chaque loi. Écrit d'abord en staging,
      # valide les compteurs, puis bascule (une langue à la fois, sans toucher l'autre).
      # NB : le schéma D1 doit avoir été appliqué une fois (phase 1) ; ce job ne
      # recharge que les données. LégisQuébec bloque certains User-Agent : le
      # pipeline utilise un UA navigateur (voir pipeline/config.py). Si un blocage
      # par IP de centre de données survient, exécuter le pipeline hors CI.
      - name: Ingérer toutes les lois (FR+EN) dans D1
        run: python -m pipeline.ingest --all --download --refresh-dates --apply-remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
