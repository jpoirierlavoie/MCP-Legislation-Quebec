name: veille-consolidation

# Détecteur EN LECTURE SEULE (remplace l'ancien job de rafraîchissement, retiré parce
# qu'il écrivait en production sans faire le rafraîchissement complet — cf. l'historique
# de .github/workflows/ et CLAUDE.md). Ici : rien n'est écrit en base.
#
# Compare, pour chaque loi, la date « À jour au » affichée par LégisQuébec à la date
# consol_date_* chargée en D1 (lue via l'endpoint MCP PUBLIC, sans secret Cloudflare).
# Si LégisQuébec a consolidé au-delà de ce qui est chargé, ouvre/actualise une issue.
# La bascule elle-même reste la procédure manuelle et supervisée de CLAUDE.md.
on:
  schedule:
    - cron: "0 12 1 * *" # 1er de chaque mois, 12:00 UTC — lecture seule, sans risque
  workflow_dispatch: {} # déclenchement manuel à la demande

permissions:
  contents: read
  issues: write # seul droit d'écriture : ouvrir/actualiser l'issue de veille

concurrency:
  group: veille-consolidation
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci

      - name: Détecter la dérive de consolidation
        id: detect
        env:
          MCP_URL: https://legislation.poirierlavoie.ca/mcp
          # Jeton d'accès de l'endpoint MCP (src/auth.ts). Ce n'est PAS un jeton Cloudflare :
          # il n'ouvre que la lecture MCP, aucun droit sur le compte ni sur la base.
          MCP_TOKEN: ${{ secrets.MCP_TOKEN }}
        run: node scripts/check-consolidation.mjs

      # Deux signaux SÉPARÉS depuis le 2026-07-23 (scripts/check-consolidation.mjs) :
      #   drift       — dérive corpus actionnable (retard, anomalie, date absente,
      #                 page illisible, loi sans langue) ;
      #   unreachable — blocage réseau massif (>= 25 % de pages injoignables).
      # Le titre de l'issue dit LEQUEL a parlé (le titre unique mentait : « rafraîchissement
      # dû » alors que seule la joignabilité posait problème). On ne clôt que si les DEUX
      # sont éteints : une page injoignable est une loi NON VÉRIFIÉE, pas une loi à jour —
      # clore sur le seul drift=false laisserait un blocage total masquer une vraie dérive.
      - name: Ouvrir ou actualiser l'issue de veille (dérive corpus)
        if: steps.detect.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh label create veille-consolidation \
            --description "Dérive de consolidation détectée automatiquement" \
            --color FBCA04 --force
          existing=$(gh issue list --label veille-consolidation --state open \
            --json number --jq '.[0].number // empty')
          title="Veille consolidation — rafraîchissement dû ($(date -u +%Y-%m-%d))"
          if [ -n "$existing" ]; then
            # Issue déjà ouverte : corps régénéré ET titre resynchronisé (l'issue a pu
            # être ouverte sous le titre « vérification incomplète » le mois d'avant).
            # Pas de commentaire mensuel redondant — l'issue ouverte EST le signal persistant.
            gh issue edit "$existing" --title "$title" --body-file consolidation-report.md
            echo "Issue #$existing actualisée (corps + titre)."
          else
            gh issue create \
              --title "$title" \
              --label veille-consolidation \
              --body-file consolidation-report.md
          fi

      - name: Tenir l'issue ouverte si la vérification est incomplète (blocage réseau)
        if: steps.detect.outputs.drift == 'false' && steps.detect.outputs.unreachable == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh label create veille-consolidation \
            --description "Dérive de consolidation détectée automatiquement" \
            --color FBCA04 --force
          existing=$(gh issue list --label veille-consolidation --state open \
            --json number --jq '.[0].number // empty')
          title="Veille consolidation — vérification incomplète, LégisQuébec injoignable depuis le runner ($(date -u +%Y-%m-%d))"
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --title "$title" --body-file consolidation-report.md
            echo "Issue #$existing retitrée : vérification incomplète."
          else
            gh issue create \
              --title "$title" \
              --label veille-consolidation \
              --body-file consolidation-report.md
          fi

      - name: Clore l'issue si tout est résolu (dérive ET réseau)
        if: steps.detect.outputs.drift == 'false' && steps.detect.outputs.unreachable == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          existing=$(gh issue list --label veille-consolidation --state open \
            --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            # État terminal atteint : on ferme UNE fois, on ne re-commente pas chaque mois.
            gh issue close "$existing" \
              --comment "Veille du $(date -u +%Y-%m-%d) : plus aucune dérive détectée et toutes les pages joignables. Clôture automatique."
          fi
